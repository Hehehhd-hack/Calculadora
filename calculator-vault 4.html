<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
input, textarea { -webkit-user-select: text; user-select: text; }
html, body { width: 100%; height: 100%; background: #1c1c1e; overflow: hidden; position: fixed; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
body { display: flex; align-items: center; justify-content: center; }

/* CALCULATOR */
#calculator { width: 100%; height: 100%; max-width: 430px; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: env(safe-area-inset-bottom, 8px); }
#display { padding: 10px 20px 6px; text-align: right; flex-shrink: 0; }
#expr { color: #888; font-size: clamp(14px, 4vw, 20px); min-height: 22px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
#result { color: #fff; font-size: clamp(44px, 13vw, 70px); font-weight: 300; line-height: 1.05; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(8px, 2.5vw, 13px); padding: clamp(8px, 2vw, 12px); flex-shrink: 0; }
.btn { border: none; border-radius: 50%; width: 100%; aspect-ratio: 1; font-size: clamp(18px, 5.5vw, 26px); font-weight: 400; cursor: pointer; touch-action: manipulation; -webkit-appearance: none; appearance: none; display: flex; align-items: center; justify-content: center; padding: 0; transition: filter 0.08s; -webkit-user-select: none; user-select: none; }
.btn:active { filter: brightness(1.4); }
.btn-func { background: #a5a5a5; color: #000; }
.btn-op   { background: #ff9f0a; color: #fff; }
.btn-num  { background: #333335; color: #fff; }
.btn-zero { background: #333335; color: #fff; border-radius: 100px; grid-column: span 2; aspect-ratio: unset; height: clamp(52px, 14vw, 76px); justify-content: flex-start; padding-left: clamp(20px, 6.5vw, 30px); }

/* PIN */
#pinOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: clamp(14px, 4vh, 26px); padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px); }
#pinOverlay.open { display: flex; }
#pinOverlay h2 { color: #fff; font-size: clamp(18px, 5vw, 24px); font-weight: 500; }
.pin-dots { display: flex; gap: 18px; }
.pin-dot { width: clamp(12px, 3.5vw, 16px); height: clamp(12px, 3.5vw, 16px); border-radius: 50%; border: 2px solid #555; background: transparent; transition: background .15s; }
.pin-dot.filled { background: #ff9f0a; border-color: #ff9f0a; }
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(10px, 3vw, 16px); width: clamp(240px, 72vw, 290px); }
.pin-btn { aspect-ratio: 1; border-radius: 50%; border: none; background: #1c1c1c; color: #fff; font-size: clamp(22px, 6.5vw, 30px); cursor: pointer; touch-action: manipulation; -webkit-appearance: none; appearance: none; display: flex; align-items: center; justify-content: center; width: 100%; transition: filter 0.08s; }
.pin-btn:active { filter: brightness(1.5); }
.pin-btn.del { font-size: clamp(18px, 5vw, 22px); background: none; }
#pinError { color: #ff453a; font-size: 14px; min-height: 20px; text-align: center; }

/* VAULT */
#vault { display: none; position: fixed; inset: 0; background: #000; flex-direction: column; z-index: 100; }
#vault.open { display: flex; }
.vault-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; padding: calc(env(safe-area-inset-top, 0px) + 14px) 14px 12px; background: #111; flex-shrink: 0; }
.vault-header h1 { color: #fff; font-size: clamp(18px, 5.5vw, 26px); font-weight: 700; }
.vault-tabs { display: flex; gap: 6px; }
.tab { padding: 7px 13px; border-radius: 20px; border: none; background: #222; color: #888; font-size: clamp(11px, 3.2vw, 14px); cursor: pointer; touch-action: manipulation; -webkit-appearance: none; white-space: nowrap; transition: background .2s, color .2s; }
.tab.active { background: #ff9f0a; color: #fff; }

<script>
'use strict';

/* TAP HELPER */
function onTap(el, fn) {
  let sx, sy, moved;
  el.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false; }, {passive:true});
  el.addEventListener('touchmove', e => { if(Math.abs(e.touches[0].clientX-sx)>10||Math.abs(e.touches[0].clientY-sy)>10) moved=true; }, {passive:true});
  el.addEventListener('touchend', e => { if(!moved){e.preventDefault();fn(e);} }, {passive:false});
  el.addEventListener('click', fn);
}

/* LONG PRESS */
function onLongPress(el, fn) {
  let timer, sx, sy, moved;
  el.addEventListener('touchstart', e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false; timer=setTimeout(()=>{if(!moved)fn(e.touches[0].clientX,e.touches[0].clientY);},500); },{passive:true});
  el.addEventListener('touchmove', e => { if(Math.abs(e.touches[0].clientX-sx)>10||Math.abs(e.touches[0].clientY-sy)>10){moved=true;clearTimeout(timer);} },{passive:true});
  el.addEventListener('touchend', ()=>clearTimeout(timer));
  el.addEventListener('touchcancel', ()=>clearTimeout(timer));
  el.addEventListener('contextmenu', e=>{e.preventDefault();fn(e.clientX,e.clientY);});
}

/* INDEXEDDB */
const DB_NAME='vaultDB', DB_VER=1;
let db;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>{const d=e.target.result;['photos','videos','notes'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:'id',autoIncrement:true});});};req.onsuccess=e=>{db=e.target.result;res();};req.onerror=e=>rej(e);});}
const tx=(s,m,fn)=>new Promise((res,rej)=>{const r=fn(db.transaction(s,m).objectStore(s));r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e);});
const getAll=s=>tx(s,'readonly',os=>os.getAll());
const add=(s,o)=>tx(s,'readwrite',os=>os.add(o));
const del=(s,id)=>tx(s,'readwrite',os=>os.delete(id));
const put=(s,o)=>tx(s,'readwrite',os=>os.put(o));

/* CALCULATOR */
const $result=document.getElementById('result');
const $expr=document.getElementById('expr');
let S={disp:'0',expr:'',prev:null,op:null,waiting:false,evaled:false};
const SECRET='2013';
let buf='';

function calc(action,val){
  if(action==='num'){
    if(S.waiting){S.disp=val==='0'?'0':val;S.waiting=false;}
    else S.disp=S.disp==='0'?val:S.disp.length<12?S.disp+val:S.disp;
    if(S.evaled){S.expr='';S.evaled=false;}
    buf+=val;
    if(buf.length>SECRET.length)buf=buf.slice(-SECRET.length);
    if(buf===SECRET){openVault();return;}
  }
  if(action==='dot'){if(S.waiting){S.disp='0.';S.waiting=false;draw();return;}if(!S.disp.includes('.'))S.disp+='.';}
  if(action==='clear'){S.disp='0';S.expr='';S.prev=null;S.op=null;S.waiting=false;S.evaled=false;}
  if(action==='sign')S.disp=String(-parseFloat(S.disp));
  if(action==='pct')S.disp=String(parseFloat(S.disp)/100);
  if(action==='op'){const c=parseFloat(S.disp);if(S.op&&!S.waiting){const r=run(S.prev,S.op,c);S.disp=fmt(r);S.prev=r;}else S.prev=c;S.op=val;S.expr=fmt(S.prev)+' '+val;S.waiting=true;S.evaled=false;}
  if(action==='eq'){if(!S.op)return;const c=parseFloat(S.disp),r=run(S.prev,S.op,c);S.expr=fmt(S.prev)+' '+S.op+' '+fmt(c)+' =';S.disp=fmt(r);S.prev=null;S.op=null;S.waiting=false;S.evaled=true;}
  draw();
}
const run=(a,op,b)=>op==='+'?a+b:op==='\u2212'?a-b:op==='\u00d7'?a*b:b?a/b:0;
const fmt=n=>{if(n===null||isNaN(n))return'0';const s=String(n);return s.length>12?parseFloat(n.toPrecision(8)).toString():s;};
const draw=()=>{$result.textContent=S.disp;$expr.textContent=S.expr;};

document.querySelectorAll('.btn').forEach(btn=>{onTap(btn,()=>{const a=btn.dataset.a,v=btn.dataset.v;calc(a,v);});});

/* PIN */
const $pin=document.getElementById('pinOverlay');
const $perr=document.getElementById('pinError');
let pinEntry='';
const dotEl=i=>document.getElementById('d'+i);
const updateDots=()=>{for(let i=0;i<4;i++)dotEl(i).classList.toggle('filled',i<pinEntry.length);};
function showPin(){pinEntry='';$perr.textContent='';updateDots();$pin.classList.add('open');}
document.querySelectorAll('.pin-btn').forEach(btn=>{onTap(btn,()=>{const n=btn.dataset.n;if(n==='del')pinEntry=pinEntry.slice(0,-1);else{if(pinEntry.length>=4)return;pinEntry+=n;}updateDots();$perr.textContent='';if(pinEntry.length===4)verifyPin();});});
function verifyPin(){if(pinEntry===SECRET){$pin.classList.remove('open');document.getElementById('vault').classList.add('open');loadTab(currentTab);}else{$perr.textContent='Incorrect passcode';pinEntry='';updateDots();}}
function openVault(){showPin();}

/* CONFIRM */
function myConfirm(msg){return new Promise(res=>{document.getElementById('confirmMsg').textContent=msg;const modal=document.getElementById('confirmModal');modal.classList.add('open');const ok=document.getElementById('confirmOk');const can=document.getElementById('confirmCancel');const done=val=>{modal.classList.remove('open');ok.removeEventListener('click',yes);can.removeEventListener('click',no);res(val);};const yes=()=>done(true),no=()=>done(false);ok.addEventListener('click',yes);can.addEventListener('click',no);});}

/* CONTEXT MENU */
const $ctx=document.getElementById('ctxMenu');
let ctxId=null,ctxEl=null,ctxTab=null;
function showCtx(x,y,id,el){ctxId=id;ctxEl=el;ctxTab=currentTab;$ctx.style.left=Math.min(x,innerWidth-185)+'px';$ctx.style.top=Math.min(y,innerHeight-115)+'px';$ctx.classList.add('open');}
function hideCtx(){$ctx.classList.remove('open');ctxId=null;ctxEl=null;ctxTab=null;}
document.addEventListener('touchstart',e=>{if(!$ctx.contains(e.target))hideCtx();},{passive:true});
document.addEventListener('click',e=>{if(!$ctx.contains(e.target))hideCtx();});
onTap(document.getElementById('ctxSelect'),()=>{if(ctxId!==null){enterSel();toggleSel(ctxId,ctxEl);}hideCtx();});
onTap(document.getElementById('ctxDelete'),async()=>{const id=ctxId,tab=ctxTab;hideCtx();if(id===null)return;if(await myConfirm('Delete this item?')){await del(tab,id);loadTab(tab);}});

/* VAULT */
let currentTab='photos';
let selected=new Set();
let selMode=false;

document.querySelectorAll('.tab').forEach(t=>{onTap(t,()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');currentTab=t.dataset.tab;selected.clear();selMode=false;updateSelBtn();updateBar();loadTab(currentTab);});});

async function loadTab(tab){
  const el=document.getElementById('vaultContent');
  const toolbar=document.getElementById('vaultToolbar');
  if(tab==='browser'){toolbar.style.display='none';el.style.display='none';document.getElementById('butterBrowser').classList.add('open');return;}
  toolbar.style.display='';el.style.display='';
  document.getElementById('butterBrowser').classList.remove('open');
  if(tab==='notes'){renderNotes();return;}
  const items=await getAll(tab);
  if(!items.length){el.innerHTML='<div class="empty">'+(tab==='photos'?'\uD83D\uDDBC\uFE0F':'\uD83C\uDFAC')+'<p>No '+tab+' yet</p></div>';return;}
  el.innerHTML='<div class="media-grid" id="grid"></div>';
  const grid=document.getElementById('grid');
  items.forEach(item=>{
    const div=document.createElement('div');
    div.className='media-item'+(selected.has(item.id)?' selected':'');
    if(tab==='photos'){const img=document.createElement('img');img.src=item.dataURL;img.loading='lazy';div.appendChild(img);}
    else{const vid=document.createElement('video');vid.src=item.dataURL;vid.preload='metadata';div.appendChild(vid);const b=document.createElement('span');b.className='type-badge';b.textContent='\u25B6';div.appendChild(b);}
    const chk=document.createElement('span');chk.className='check';chk.textContent='\u2713';div.appendChild(chk);
    onLongPress(div,(x,y)=>showCtx(x,y,item.id,div));
    onTap(div,()=>{if($ctx.classList.contains('open'))return;if(selMode)toggleSel(item.id,div);else openLight(tab,item);});
    grid.appendChild(div);
  });
}

function enterSel(){selMode=true;updateSelBtn();updateBar();}
function toggleSel(id,el){if(selected.has(id)){selected.delete(id);el.classList.remove('selected');}else{selected.add(id);el.classList.add('selected');}updateBar();}
function updateSelBtn(){const b=document.getElementById('selBtn');b.textContent=selMode?'\u2713 Done':'\u2611 Select';b.classList.toggle('active-mode',selMode);}
function updateBar(){document.getElementById('delBtn').style.display=selected.size>0?'':'none';document.getElementById('selAllBtn').style.display=selMode&&currentTab!=='notes'&&currentTab!=='browser'?'':'none';}
onTap(document.getElementById('selBtn'),()=>{selMode=!selMode;if(!selMode){selected.clear();loadTab(currentTab);}updateSelBtn();updateBar();});
onTap(document.getElementById('lockBtn'),()=>{document.getElementById('vault').classList.remove('open');document.getElementById('butterBrowser').classList.remove('open');selected.clear();selMode=false;updateSelBtn();updateBar();});
onTap(document.getElementById('addBtn'),()=>{if(currentTab==='photos')document.getElementById('photoInput').click();else if(currentTab==='videos')document.getElementById('videoInput').click();else editNote(null);});
const readF=f=>new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);});
document.getElementById('photoInput').addEventListener('change',async e=>{for(const f of e.target.files)await add('photos',{dataURL:await readF(f),name:f.name,date:Date.now()});e.target.value='';loadTab('photos');});
document.getElementById('videoInput').addEventListener('change',async e=>{for(const f of e.target.files)await add('videos',{dataURL:await readF(f),name:f.name,date:Date.now()});e.target.value='';loadTab('videos');});
onTap(document.getElementById('delBtn'),async()=>{if(!selected.size)return;if(!await myConfirm('Delete '+selected.size+' item'+(selected.size>1?'s':'')+ '?'))return;for(const id of selected)await del(currentTab,id);selected.clear();selMode=false;updateSelBtn();updateBar();loadTab(currentTab);});
onTap(document.getElementById('selAllBtn'),async()=>{const items=await getAll(currentTab);items.forEach(i=>selected.add(i.id));loadTab(currentTab);updateBar();});

/* LIGHTBOX */
const $lb=document.getElementById('lightbox');
const $img=document.getElementById('lbImg');
const $vid=document.getElementById('lbVid');
function openLight(type,item){if(type==='photos'){$img.src=item.dataURL;$img.style.display='';$vid.style.display='none';}else{$vid.src=item.dataURL;$vid.style.display='';$img.style.display='none';}$lb.classList.add('open');}
onTap(document.getElementById('lbClose'),()=>{$lb.classList.remove('open');$vid.pause();});

/* NOTES */
async function renderNotes(){
  const el=document.getElementById('vaultContent');
  const notes=await getAll('notes');
  if(!notes.length){el.innerHTML='<div class="empty">\uD83D\uDCDD<p>No notes yet</p></div>';return;}
  el.innerHTML='<div class="note-list" id="noteList"></div>';
  const list=document.getElementById('noteList');
  notes.sort((a,b)=>b.date-a.date).forEach(note=>{
    const div=document.createElement('div');
    div.className='note-card'+(selected.has(note.id)?' selected':'');
    div.innerHTML='<h3>'+esc(note.title||'Untitled')+'</h3><p>'+esc(note.body||'')+'</p><div class="meta">'+new Date(note.date).toLocaleDateString()+'</div>';
    onLongPress(div,(x,y)=>showCtx(x,y,note.id,div));
    onTap(div,()=>{if($ctx.classList.contains('open'))return;if(selMode)toggleSel(note.id,div);else editNote(note);});
    list.appendChild(div);
  });
}
let editingNote=null;
function editNote(note){editingNote=note;document.getElementById('noteTitle').value=note?note.title:'';document.getElementById('noteBody').value=note?note.body:'';document.getElementById('noteEditor').classList.add('open');}
onTap(document.getElementById('noteSave'),async()=>{const title=document.getElementById('noteTitle').value.trim()||'Untitled';const body=document.getElementById('noteBody').value;if(editingNote)await put('notes',{...editingNote,title,body,date:Date.now()});else await add('notes',{title,body,date:Date.now()});document.getElementById('noteEditor').classList.remove('open');renderNotes();});
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* BUTTER BROWSER */
const $frame=document.getElementById('butterFrame');
const $blocked=document.getElementById('butterBlocked');
let currentBrowserUrl='';

function butterNavigate(url){
  if(!url)return;
  if(!/^https?:\/\//i.test(url)){
    if(url.includes('.')&&!url.includes(' ')){url='https://'+url;}
    else{url='https://www.google.com/search?q='+encodeURIComponent(url);}
  }
  currentBrowserUrl=url;
  document.getElementById('butterInput').value=url;
  $blocked.classList.remove('show');
  $frame.style.display='block';
  $frame.src=url;
}

$frame.addEventListener('load',()=>{
  try{const u=$frame.contentWindow.location.href;if(u&&u!=='about:blank')document.getElementById('butterInput').value=u;}catch(e){}
});
$frame.addEventListener('error',()=>{$frame.style.display='none';$blocked.classList.add('show');});

onTap(document.getElementById('butterGo'),()=>{butterNavigate(document.getElementById('butterInput').value.trim());});
document.getElementById('butterInput').addEventListener('keydown',e=>{if(e.key==='Enter')butterNavigate(document.getElementById('butterInput').value.trim());});
onTap(document.getElementById('bBack'),()=>{try{$frame.contentWindow.history.back();}catch(e){}});
onTap(document.getElementById('bFwd'),()=>{try{$frame.contentWindow.history.forward();}catch(e){}});
onTap(document.getElementById('bRefresh'),()=>{try{$frame.contentWindow.location.reload();}catch(e){if(currentBrowserUrl)butterNavigate(currentBrowserUrl);}});
onTap(document.getElementById('butterClose'),()=>{document.getElementById('butterBrowser').classList.remove('open');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelector('.tab[data-tab="photos"]').classList.add('active');currentTab='photos';document.getElementById('vaultToolbar').style.display='';document.getElementById('vaultContent').style.display='';loadTab('photos');});
document.querySelectorAll('.bq-btn').forEach(btn=>{onTap(btn,()=>butterNavigate(btn.dataset.url));});
onTap(document.getElementById('bbOpenSafari'),()=>{if(currentBrowserUrl)window.open(currentBrowserUrl,'_blank');});

/* BOOT */
openDB().then(()=>console.log('Ready'));
</script>
</body>
